<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>crypticNode | Emoji to Text · NEO DARK</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'JetBrains Mono', monospace;
      background: #03050b;
      color: #eef2ff;
      overflow-x: hidden;
    }

    .cyber-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, #03050b 0%, #0a0f1f 50%, #010108 100%);
      z-index: -2;
    }

    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(0deg, rgba(0, 255, 200, 0.05) 0px, rgba(0, 255, 200, 0.05) 1px, transparent 1px, transparent 3px), repeating-linear-gradient(90deg, rgba(0, 255, 200, 0.05) 0px, rgba(0, 255, 200, 0.05) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: -1;
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0, 255, 200, 0.02) 0px, rgba(0, 255, 200, 0.02) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 999;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 6%;
      background: rgba(2, 5, 18, 0.8);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 10px rgba(0, 255, 200, 0.1), inset 0 1px 0 rgba(0, 255, 200, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #00ffcc30;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(145deg, #b5ffff, #2affd0, #00a6ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -1px;
      text-shadow: 0 0 4px #00ffcc80;
    }

    .logo span {
      font-weight: 700;
      background: linear-gradient(135deg, #7efff0, #00ddff);
      background-clip: text;
      -webkit-background-clip: text;
    }

    .back-link {
      color: #0ff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.2s;
    }

    .back-link:hover {
      color: #fff;
      text-shadow: 0 0 3px #0ff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 5;
    }

    .tool-header {
      padding: 2rem 0 1rem 0;
    }

    .tool-header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #7effe0, #2a9dff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      filter: drop-shadow(0 0 6px rgba(0,255,200,0.3));
    }

    .tool-header h1 i {
      color: #0ff;
      text-shadow: 0 0 3px #0ff;
    }

    .tool-header p {
      color: #9bc0f0;
      margin-top: 0.5rem;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #0ff, #0ff, transparent);
      margin: 1.5rem 0;
    }

    .tool-card {
      background: rgba(6, 10, 22, 0.65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 255, 210, 0.4);
      border-radius: 28px;
      padding: 2rem;
      margin: 1rem 0 2rem 0;
      box-shadow: 0 20px 35px -8px black;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #eef2ff;
      font-size: 0.9rem;
    }

    .form-group label i {
      color: #0ff;
      margin-right: 0.5rem;
    }

    .form-group textarea {
      width: 100%;
      padding: 1rem;
      background: #01030f;
      border: 1px solid #2c799b;
      border-radius: 16px;
      font-size: 1.1rem;
      font-family: 'Inter', monospace;
      resize: vertical;
      outline: none;
      color: #eaf6ff;
    }

    .form-group textarea:focus {
      border-color: #0ff;
      box-shadow: 0 0 8px #0ff;
    }

    .convert-btn {
      background: linear-gradient(95deg, #0a1128, #020617);
      color: white;
      padding: 0.9rem 2rem;
      border: 1px solid #0ff;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: 0.2s;
    }

    .convert-btn:hover {
      background: #142845;
      box-shadow: 0 0 10px #0ff;
      border-color: #b5ffff;
    }

    .result-box {
      background: rgba(2, 5, 18, 0.5);
      border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 20px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }

    .result-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #9bc0f0;
      margin-bottom: 0.75rem;
    }

    .result-content {
      background: #01030f;
      border: 1px solid #2c799b;
      border-radius: 16px;
      padding: 1rem;
      font-family: 'Inter', monospace;
      font-size: 1rem;
      word-break: break-all;
      color: #eaf6ff;
      min-height: 80px;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #4a7a9f;
      border-top: 1px solid #0ff4;
      background: rgba(1, 3, 12, 0.6);
      backdrop-filter: blur(12px);
      font-size: 0.8rem;
      position: relative;
      z-index: 5;
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }
      .tool-header h1 {
        font-size: 1.5rem;
      }
      .container {
        padding: 0 1rem;
      }
      .tool-card {
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>

<div class="cyber-bg"></div>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<nav class="navbar">
  <div class="logo">Cryptic<span>Node</span></div>
  <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</nav>

<main class="container">
  <div class="tool-header">
    <h1><i class="fas fa-font"></i> Emoji to Text</h1>
    <p>Convert emoji sequences back into readable text</p>
  </div>

  <div class="divider"></div>

  <div class="tool-card">
    <form method="POST" action="/Emoji">
      <div class="form-group">
        <label><i class="fas fa-laugh-squint"></i> Emoji Text</label>
        <textarea name="emoji_text" rows="4" placeholder="Paste your emojis here...">{{ emoji_input }}</textarea>
      </div>

      <button type="submit" class="convert-btn">
        <i class="fas fa-exchange-alt"></i> Convert to Text
      </button>

      <div class="result-box">
        <div class="result-label">
          <i class="fas fa-pencil-alt"></i> Text Output
        </div>
        <div class="result-content">
          {{ text_output if text_output else "Your converted emoji will appear here" }}
        </div>
      </div>
    </form>
  </div>
</main>

<footer>
  <p>© 2026 crypticNode — Emoji Decoder</p>
</footer>

</body>
</html>
